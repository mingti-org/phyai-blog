<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" role="img" aria-labelledby="title desc">
	<title id="title">PI0.5 batching efficiency and throughput scaling</title>
	<desc id="desc">Four line plots show PI0.5 amortized execution time per sample and throughput across batch sizes 1 to 32 on a Hopper-series GPU and NVIDIA Thor. The Hopper-series GPU reaches 10 milliseconds of amortized execution time per sample and 100 samples per second at batch size 32. Thor peaks near 16.25 samples per second at batch size 16.</desc>
	<style>
		.title { font: 600 16px "Helvetica Neue", Arial, sans-serif; fill: #191c19; letter-spacing: 0; }
		.subtitle { font: 500 10px "Helvetica Neue", Arial, sans-serif; fill: #555b54; letter-spacing: 0; }
		.panel { font: 600 11px "Helvetica Neue", Arial, sans-serif; fill: #191c19; letter-spacing: 0; }
		.axis { font: 500 9px "SFMono-Regular", Consolas, monospace; fill: #555b54; letter-spacing: 0; }
		.value { font: 600 9px "SFMono-Regular", Consolas, monospace; fill: #0756c9; letter-spacing: 0; }
		.note { font: 500 9px "Helvetica Neue", Arial, sans-serif; fill: #555b54; letter-spacing: 0; }
	</style>
	<rect width="600" height="470" fill="#fff" />
	<text x="48" y="30" class="title">PI0.5 scaling across batch sizes</text>
	<text x="48" y="49" class="subtitle">BF16 · CUDA Graph enabled · lower amortized time / higher throughput</text>

	<g aria-label="Hopper-series GPU amortized execution time per sample">
		<text x="60" y="75" class="panel">Hopper-series GPU</text>
		<text x="60" y="88" class="subtitle">Amortized time (ms/sample)</text>
		<g stroke="#dde0dc">
			<path d="M75 95 H270" />
			<path d="M75 141 H270" />
			<path d="M75 187 H270" />
			<path d="M75 210 H270" stroke="#8e948d" />
		</g>
		<g class="axis" text-anchor="end">
			<text x="68" y="99">25</text><text x="68" y="145">15</text><text x="68" y="191">5</text><text x="68" y="214">0</text>
		</g>
		<polyline points="75,106 114,137.3 153,151.6 192,158.5 231,161.2 270,164" fill="none" stroke="#0756c9" stroke-width="2.5" />
		<g fill="#d9ed69" stroke="#0756c9" stroke-width="1.5">
			<circle cx="75" cy="106" r="4" /><circle cx="114" cy="137.3" r="4" /><circle cx="153" cy="151.6" r="4" /><circle cx="192" cy="158.5" r="4" /><circle cx="231" cy="161.2" r="4" /><circle cx="270" cy="164" r="4" />
		</g>
		<text x="96" y="109" class="value">22.6</text>
		<text x="270" y="156" class="value" text-anchor="middle">10.0</text>
	</g>

	<g aria-label="Hopper-series GPU throughput">
		<text x="330" y="75" class="panel">Hopper-series GPU</text>
		<text x="330" y="88" class="subtitle">Throughput (samples/s)</text>
		<g stroke="#dde0dc">
			<path d="M350 105.5 H545" />
			<path d="M350 157.7 H545" />
			<path d="M350 210 H545" stroke="#8e948d" />
		</g>
		<g class="axis" text-anchor="end">
			<text x="343" y="109.5">100</text><text x="343" y="161.7">50</text><text x="343" y="214">0</text>
		</g>
		<polyline points="350,163.7 389,143.6 428,127.9 467,116.4 506,110.9 545,105.5" fill="none" stroke="#0756c9" stroke-width="2.5" />
		<g fill="#d9ed69" stroke="#0756c9" stroke-width="1.5">
			<circle cx="350" cy="163.7" r="4" /><circle cx="389" cy="143.6" r="4" /><circle cx="428" cy="127.9" r="4" /><circle cx="467" cy="116.4" r="4" /><circle cx="506" cy="110.9" r="4" /><circle cx="545" cy="105.5" r="4" />
		</g>
		<text x="359" y="155" class="value">44.3</text>
		<text x="545" y="97" class="value" text-anchor="middle">100.0</text>
	</g>

	<g aria-label="Thor amortized execution time per sample">
		<text x="60" y="263" class="panel">Thor</text>
		<text x="60" y="276" class="subtitle">Amortized time (ms/sample)</text>
		<g stroke="#dde0dc">
			<path d="M75 285 H270" />
			<path d="M75 342.5 H270" />
			<path d="M75 400 H270" stroke="#8e948d" />
		</g>
		<g class="axis" text-anchor="end">
			<text x="68" y="289">150</text><text x="68" y="346.5">75</text><text x="68" y="404">0</text>
		</g>
		<polyline points="75,296.7 114,313.4 153,311.8 192,351.9 231,352.8 270,351.7" fill="none" stroke="#0756c9" stroke-width="2.5" />
		<g fill="#d9ed69" stroke="#0756c9" stroke-width="1.5">
			<circle cx="75" cy="296.7" r="4" /><circle cx="114" cy="313.4" r="4" /><circle cx="192" cy="351.9" r="4" /><circle cx="231" cy="352.8" r="4" /><circle cx="270" cy="351.7" r="4" />
			<circle cx="153" cy="311.8" r="4" fill="#fff" />
		</g>
		<text x="84" y="289" class="value">134.7</text>
		<text x="153" y="304" class="value" text-anchor="middle">115.0†</text>
		<text x="270" y="344" class="value" text-anchor="middle">63.0</text>
	</g>

	<g aria-label="Thor throughput">
		<text x="330" y="270" class="panel">Thor · throughput (samples/s)</text>
		<g stroke="#dde0dc">
			<path d="M350 285 H545" />
			<path d="M350 342.5 H545" />
			<path d="M350 400 H545" stroke="#8e948d" />
		</g>
		<g class="axis" text-anchor="end">
			<text x="343" y="289">18</text><text x="343" y="346.5">9</text><text x="343" y="404">0</text>
		</g>
		<polyline points="350,352.5 389,343.5 428,344.4 467,298.2 506,296.2 545,298.5" fill="none" stroke="#0756c9" stroke-width="2.5" />
		<g fill="#d9ed69" stroke="#0756c9" stroke-width="1.5">
			<circle cx="350" cy="352.5" r="4" /><circle cx="389" cy="343.5" r="4" /><circle cx="467" cy="298.2" r="4" /><circle cx="506" cy="296.2" r="4" /><circle cx="545" cy="298.5" r="4" />
			<circle cx="428" cy="344.4" r="4" fill="#fff" />
		</g>
		<text x="359" y="345" class="value">7.43</text>
		<text x="506" y="288" class="value" text-anchor="middle">16.25</text>
	</g>

	<g class="axis" text-anchor="middle">
		<text x="75" y="226">1</text><text x="114" y="226">2</text><text x="153" y="226">4</text><text x="192" y="226">8</text><text x="231" y="226">16</text><text x="270" y="226">32</text>
		<text x="350" y="226">1</text><text x="389" y="226">2</text><text x="428" y="226">4</text><text x="467" y="226">8</text><text x="506" y="226">16</text><text x="545" y="226">32</text>
		<text x="75" y="416">1</text><text x="114" y="416">2</text><text x="153" y="416">4</text><text x="192" y="416">8</text><text x="231" y="416">16</text><text x="270" y="416">32</text>
		<text x="350" y="416">1</text><text x="389" y="416">2</text><text x="428" y="416">4</text><text x="467" y="416">8</text><text x="506" y="416">16</text><text x="545" y="416">32</text>
	</g>
	<text x="300" y="448" class="axis" text-anchor="middle">Batch size</text>
	<text x="48" y="465" class="note">† Thor bs=4 showed elevated variance and should be treated as a noisy point.</text>
</svg>
