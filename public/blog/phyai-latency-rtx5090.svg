<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-labelledby="title desc">
	<title id="title">Latency comparison on NVIDIA RTX 5090</title>
	<desc id="desc">A grouped bar chart comparing PhyAI with official implementations for PI0, PI0.5, and GR00T. PhyAI achieves 2.85, 1.82, and 2.28 times speedups respectively.</desc>
	<style>
		.title { font: 600 19px "Helvetica Neue", Arial, sans-serif; fill: #191c19; letter-spacing: 0; }
		.subtitle { font: 500 12px "Helvetica Neue", Arial, sans-serif; fill: #555b54; letter-spacing: 0; }
		.axis { font: 500 11px "SFMono-Regular", Consolas, monospace; fill: #555b54; letter-spacing: 0; }
		.category { font: 600 13px "Helvetica Neue", Arial, sans-serif; fill: #191c19; letter-spacing: 0; }
		.value { font: 600 10px "SFMono-Regular", Consolas, monospace; fill: #191c19; letter-spacing: 0; }
		.legend { font: 500 11px "Helvetica Neue", Arial, sans-serif; fill: #555b54; letter-spacing: 0; }
		.speedup { font: 700 11px "SFMono-Regular", Consolas, monospace; fill: #0756c9; letter-spacing: 0; }
	</style>

	<rect width="600" height="420" fill="#fff" />
	<text x="68" y="34" class="title">RTX 5090 latency by model</text>
	<text x="68" y="56" class="subtitle">Single-sample latency (ms) · lower is better</text>

	<g aria-label="Legend">
		<rect x="390" y="26" width="13" height="13" fill="#b7bcb6" />
		<text x="411" y="37" class="legend">Official</text>
		<rect x="484" y="26" width="13" height="13" fill="#0756c9" />
		<text x="505" y="37" class="legend">PhyAI</text>
	</g>

	<g stroke="#dde0dc" stroke-width="1">
		<path d="M68 90 H568" />
		<path d="M68 124.3 H568" />
		<path d="M68 158.6 H568" />
		<path d="M68 192.9 H568" />
		<path d="M68 227.1 H568" />
		<path d="M68 261.4 H568" />
		<path d="M68 295.7 H568" />
		<path d="M68 330 H568" stroke="#8e948d" />
	</g>
	<g class="axis" text-anchor="end">
		<text x="58" y="334">0</text>
		<text x="58" y="299.7">20</text>
		<text x="58" y="265.4">40</text>
		<text x="58" y="231.1">60</text>
		<text x="58" y="196.9">80</text>
		<text x="58" y="162.6">100</text>
		<text x="58" y="128.3">120</text>
		<text x="58" y="94">140</text>
	</g>

	<g aria-label="PI0: official 127.48 milliseconds, PhyAI 44.76 milliseconds">
		<rect x="112" y="111.5" width="42" height="218.5" fill="#b7bcb6" />
		<rect x="162" y="253.3" width="42" height="76.7" fill="#0756c9" />
		<text x="133" y="103" class="value" text-anchor="middle">127.48</text>
		<text x="183" y="245" class="value" text-anchor="middle">44.76</text>
		<text x="158" y="355" class="category" text-anchor="middle">π0</text>
		<text x="158" y="382" class="speedup" text-anchor="middle">2.85× speedup</text>
	</g>
	<g aria-label="PI0.5: official 52.08 milliseconds, PhyAI 28.61 milliseconds">
		<rect x="272" y="240.7" width="42" height="89.3" fill="#b7bcb6" />
		<rect x="322" y="281" width="42" height="49" fill="#0756c9" />
		<text x="293" y="232" class="value" text-anchor="middle">52.08</text>
		<text x="343" y="272" class="value" text-anchor="middle">28.61</text>
		<text x="318" y="355" class="category" text-anchor="middle">π0.5</text>
		<text x="318" y="382" class="speedup" text-anchor="middle">1.82× speedup</text>
	</g>
	<g aria-label="GR00T: official 46.96 milliseconds, PhyAI 20.62 milliseconds">
		<rect x="432" y="249.5" width="42" height="80.5" fill="#b7bcb6" />
		<rect x="482" y="294.7" width="42" height="35.3" fill="#0756c9" />
		<text x="453" y="241" class="value" text-anchor="middle">46.96</text>
		<text x="503" y="286" class="value" text-anchor="middle">20.62</text>
		<text x="478" y="355" class="category" text-anchor="middle">GR00T</text>
		<text x="478" y="382" class="speedup" text-anchor="middle">2.28× speedup</text>
	</g>

	<text x="16" y="215" class="axis" text-anchor="middle" transform="rotate(-90 16 215)">Latency (ms)</text>
</svg>
