<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 370" role="img" aria-labelledby="title desc">
	<title id="title">Theoretical effect of a two-times Predict speedup on VLA reinforcement-learning step time</title>
	<desc id="desc">Two donut charts compare the measured steady-state allocation of a PI0.5 reinforcement-learning step with a hypothetical case where only Predict is twice as fast. Predict takes 57.966 of 109.1 seconds before optimization. Halving Predict time reduces the theoretical total to 80.1 seconds, a 26.6 percent reduction.</desc>
	<style>
		.title { font: 600 16px "Helvetica Neue", Arial, sans-serif; fill: #191c19; }
		.subtitle { font: 500 10px "Helvetica Neue", Arial, sans-serif; fill: #555b54; }
		.panel { font: 600 12px "Helvetica Neue", Arial, sans-serif; fill: #191c19; }
		.total { font: 600 21px "SFMono-Regular", Consolas, monospace; fill: #191c19; }
		.unit { font: 500 10px "Helvetica Neue", Arial, sans-serif; fill: #555b54; }
		.value { font: 600 11px "SFMono-Regular", Consolas, monospace; fill: #191c19; }
		.label { font: 500 10px "Helvetica Neue", Arial, sans-serif; fill: #555b54; }
		.takeaway { font: 600 11px "Helvetica Neue", Arial, sans-serif; fill: #0756c9; }
	</style>

	<rect width="760" height="370" fill="#fff" />
	<text x="48" y="31" class="title">Projected RL step-time impact of 2x Predict</text>
	<text x="48" y="51" class="subtitle">PI0.5 · 8×A100 · batch 40 · 41 Predict calls per step · steady-state mean</text>

	<g aria-label="Measured steady-state step: Predict 57.966 seconds and all other work 51.134 seconds, for a total of 109.1 seconds">
		<text x="210" y="86" class="panel" text-anchor="middle">Measured steady state</text>
		<circle cx="210" cy="180" r="76" fill="none" stroke="#e1e4df" stroke-width="27" />
		<circle cx="210" cy="180" r="76" fill="none" stroke="#0756c9" stroke-width="27" pathLength="100" stroke-dasharray="53.1 46.9" transform="rotate(-90 210 180)" />
		<text x="210" y="176" class="total" text-anchor="middle">109.1 s</text>
		<text x="210" y="195" class="unit" text-anchor="middle">per step</text>
		<text x="210" y="286" class="value" text-anchor="middle">Predict 57.966 s · 53.1%</text>
		<text x="210" y="305" class="label" text-anchor="middle">All other work 51.134 s · 46.9%</text>
	</g>

	<g aria-label="Predict receives a theoretical two-times speedup">
		<path d="M340 174 H420" fill="none" stroke="#8e948d" stroke-width="1.5" />
		<path d="M414 168 L420 174 L414 180" fill="none" stroke="#8e948d" stroke-width="1.5" />
		<text x="380" y="155" class="panel" text-anchor="middle">2× Predict</text>
		<text x="380" y="196" class="subtitle" text-anchor="middle">other work unchanged</text>
	</g>

	<g aria-label="Hypothetical optimized step: Predict 28.983 seconds and all other work 51.134 seconds, for a total of 80.117 seconds">
		<text x="550" y="86" class="panel" text-anchor="middle">Theoretical projection</text>
		<circle cx="550" cy="180" r="76" fill="none" stroke="#e1e4df" stroke-width="27" />
		<circle cx="550" cy="180" r="76" fill="none" stroke="#0756c9" stroke-width="27" pathLength="100" stroke-dasharray="36.2 63.8" transform="rotate(-90 550 180)" />
		<text x="550" y="176" class="total" text-anchor="middle">80.1 s</text>
		<text x="550" y="195" class="unit" text-anchor="middle">per step</text>
		<text x="550" y="286" class="value" text-anchor="middle">Predict 28.983 s · 36.2%</text>
		<text x="550" y="305" class="label" text-anchor="middle">All other work 51.134 s · 63.8%</text>
	</g>

	<line x1="48" y1="329" x2="712" y2="329" stroke="#dde0dc" />
	<text x="380" y="353" class="takeaway" text-anchor="middle">Theoretical step-time reduction: 26.6% · not yet validated end to end</text>
</svg>
